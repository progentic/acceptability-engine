services:
  acceptability-engine:
    build:
      context: .
    image: acceptability-engine:local
    ports:
      - "8080:8080"
    environment:
      AH_WORKSPACE_MODE: local
      AH_SECURITY_MODE: disabled
      AH_SANDBOX_PROFILE: development
      RUST_LOG: core=info
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - acceptability-data:/data
      - acceptability-artifacts:/artifacts
      - ./workspaces:/workspaces
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  acceptability-data:
  acceptability-artifacts:
