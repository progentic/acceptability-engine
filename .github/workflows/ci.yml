name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_BUILD_JOBS: "1"
  CARGO_INCREMENTAL: "0"
  RUST_TEST_THREADS: "1"

jobs:
  rust:
    name: Rust fmt, clippy, test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Use Rust stable
        run: rustup default stable

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  ui:
    name: UI build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime image
        run: docker build --build-arg CARGO_BUILD_JOBS=1 --tag acceptability-engine:ci .

  manifests:
    name: Deployment manifests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifest shape
        run: kubectl apply --dry-run=client --validate=false --filename deploy/kubernetes.yaml
